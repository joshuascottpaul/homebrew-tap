name: Update Formula on Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        type: string
  repository_dispatch:
    types: [release-published]

jobs:
  update-formula:
    runs-on: macos-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from input or event
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.client_payload.release.tag_name }}" ]; then
            echo "version=${{ github.event.client_payload.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "No version specified"
            exit 1
          fi

      - name: Download tarball and calculate SHA256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/joshuascottpaul/billing-dashboard-project/archive/refs/tags/${VERSION}.tar.gz"
          echo "Downloading: $URL"
          curl -sL "$URL" -o release.tar.gz
          SHA=$(shasum -a 256 release.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "Calculated SHA256: $SHA"
          rm release.tar.gz

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"
          FORMULA_FILE="Formula/billing-dashboard.rb"
          
          # Update version in URL
          sed -i '' "s|refs/tags/v[0-9.]*|refs/tags/${VERSION}|g" "$FORMULA_FILE"
          
          # Update SHA256
          sed -i '' "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA}\"|g" "$FORMULA_FILE"
          
          echo "Updated formula:"
          head -10 "$FORMULA_FILE"

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/billing-dashboard.rb
          git commit -m "Update billing-dashboard to ${VERSION}

Co-authored-by: Qwen-Coder <qwen-coder@alibabacloud.com>"
          git push
